<!DOCTYPE html>
<html>
<head>
    <title>The AutoPack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #2e2e2e; /* Darker "Space Grey" background */
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Top Bar */
        .top-bar {
            width: 100%;
            background-color: #ffffff; /* Pure white bar */
            color: #333; /* Dark text for contrast */
            padding: 15px 0;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); /* Shadow to pop off the grey */
            border-bottom: 1px solid #ddd;
        }

        .content {
            margin-top: 60px;
            text-align: center;
            padding: 20px;
        }

        img {
            max-width: 300px;
            height: auto;
            /* Optional: adds a subtle glow to the logo since it's on dark grey */
            filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.1));
        }

        p {
            color: #cccccc; /* Light grey text so it's readable on dark grey */
            font-size: 1.2rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        AUTOPACK
    </div>

    <div class="content">
        <img src="autopacklogo.png" alt="AutoPack Logo">
        <p>The Revolutionary Change in The Backpack Industry.</p>
    </div>

</body>
</html>
