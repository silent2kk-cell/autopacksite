<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOPACK | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #2e2e2e; --accent: #ffd9a3; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Top Bar */
        .top-bar { width: 100%; height: 70px; background: #ffffff; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .logo-text { color: #1a1a1a; font-family: 'Syncopate'; margin-left: 40px; font-weight: 700; letter-spacing: 3px; }
        .nav-links { margin-right: 40px; }
        .nav-links a { text-decoration: none; color: #1a1a1a; margin-left: 20px; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; }
        .nav-links a:hover { color: #ff9d00; }

        /* Hero */
        .hero { margin-top: 160px; text-align: center; }
        .hero img { width: 300px; animation: float 5s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        h1 { font-family: 'Syncopate'; font-size: 3rem; margin: 20px 0; letter-spacing: 5px; }
        .btn { display: inline-block; padding: 15px 35px; background: var(--accent); color: #1a1a1a; text-decoration: none; font-weight: 700; border-radius: 50px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,217,163,0.4); }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo-text">AUTOPACK</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="tech.html">Tech</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
    <div class="hero">
        <img src="autopacklogo.png" alt="AutoPack Logo">
        <h1>AUTOPACK</h1>
        <p>The next generation of modular hardware.</p>
        <a href="tech.html" class="btn">View Tech Specs</a>
    </div>
</body>
</html>
