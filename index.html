<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOPACK | The Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-color: #ffd9a3; /* Matches your logo's tan/gold color */
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            /* Animated gradient background */
            background: linear-gradient(-45deg, #1a1a1a, #2c2c2c, #1a1a1a, #0f0f0f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Insane White Top Bar */
        .top-bar {
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-text {
            color: #1a1a1a;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            margin-left: 50px;
            letter-spacing: 5px;
            font-size: 1.2rem;
        }

        .nav-links {
            margin-right: 50px;
        }

        .nav-links a {
            text-decoration: none;
            color: #1a1a1a;
            margin-left: 25px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #ff9d00;
        }

        /* Hero Section */
        .hero {
            margin-top: 180px;
            text-align: center;
            padding: 20px;
        }

        .hero img {
            width: 350px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 217, 163, 0.3));
            animation: float 6s ease-in-out infinite;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hero img:hover {
            transform: scale(1.1) rotate(2deg);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3.5rem;
            margin-top: 40px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            max-width: 600px;
            margin-top: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Button style */
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--accent-color);
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(255, 217, 163, 0.2);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 217, 163, 0.4);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-text">AUTOPACK</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Tech</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <div class="hero">
        <!-- Verbatim image file reference -->
        <img src="autopacklogo.png" alt="AutoPack Logo">
        
        <h1>Engineered Excellence</h1>

        <div class="glass-card">
            <p>Welcome to the premium destination for AutoPack hardware. We are redefining the industry standard through innovation and relentless design.</p>
            <a href="#" class="btn">Explore Now</a>
        </div>
    </div>

</body>
</html>
